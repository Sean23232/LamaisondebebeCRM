function navigate(route, params={}) {
  STATE.currentRoute = route;
  STATE.routeParams = params;
  STATE.sidebarOpen = false;
  render();
  window.scrollTo(0,0);
}

// ─── HELPERS ──────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(d){ if(!d) return '—'; try{ return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}); }catch(e){ return d; } }
function fmtDT(d){ if(!d) return '—'; try{ return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}); }catch(e){ return d; } }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function getHour(){ const h=new Date().getHours(); return h<12?'morning':h<17?'afternoon':'evening'; }
function getCaregiverById(id){ return STATE.caregiverProfiles.find(p=>p.id===id); }
function getFamilyById(id){ return STATE.familyProfiles.find(p=>p.id===id); }
function getProfileByUserId(userId){ return STATE.caregiverProfiles.find(p=>p.userId===userId); }
function getFamilyByUserId(userId){ return STATE.familyProfiles.find(p=>p.userId===userId); }
function getRequestsByFamilyId(fid){ return STATE.careRequests.filter(r=>r.familyId===fid); }
function getShortlistByRequestId(rid){ return STATE.shortlists.find(s=>s.requestId===rid); }
function getInterviewByRequestId(rid){ return STATE.interviews.find(i=>i.requestId===rid); }

function statusBadgeClass(s){
  const m={new:'bg-blue-50 text-blue-700 border-blue-200',reviewing:'bg-amber-50 text-amber-700 border-amber-200',

}
function statusLabel(s){
  const m={new:'New Request',reviewing:'Under Review',shortlisted:'Shortlisted',interview_scheduled:'Interview Scheduled',closed:'Closed'};
  return m[s]||s;
}

function goldBtn(label, onclick='', variant='primary', size='md', extra=''){
  const sizes={sm:'px-4 py-2 text-xs',md:'px-6 py-3 text-sm',lg:'px-8 py-4 text-base'};
  const variants={
    primary:'bg-champagne text-charcoal hover:bg-gold-600 shadow-gold-sm hover:shadow-gold-md',
    secondary:'border border-champagne text-champagne hover:bg-champagne/10',
    ghost:'text-champagne hover:bg-champagne/10',
    danger:'bg-red-600 text-white hover:bg-red-700',
  };
  return `<button onclick="${onclick}" class="inline-flex items-center justify-center gap-2 font-sans font-medium tracking-wide rounded-sm transition-all duration-200 hover:-translate-y-px active:translate-y-0 focus-visible:ring-2 focus-visible:ring-champagne focus-visible:outline-none ${sizes[size]||sizes.md} ${variants[variant]||variants.primary} ${extra}">${label}</button>`;
}

function skillChip(skill, selected=false){
  const cls = selected
    ? 'bg-champagne/15 border-champagne/40 text-gold-700'
    : 'bg-ivory-50 border-ivory-300 text-obsidian-600';
  return `<span class="inline-flex items-center px-2.5 py-1 rounded-sm text-xs font-medium border ${cls}">${esc(skill)}</span>`;
}

  </div>`;
}

// ─── SHELL ───────────────────────────────────────────────────
function renderShell(content){
  const u = STATE.currentUser;
  const isAdmin = u.role==='admin';
  const isCaregiver = u.role==='caregiver';
  const isFamily = u.role==='family';

  const navItems = isAdmin ? [
    {label:'Dashboard',route:'admin-dashboard',icon:ICONS.dashboard},
    {label:'Caregivers',route:'admin-caregivers',icon:ICONS.users},
    {label:'Requests',route:'admin-requests',icon:ICONS.list},
    {label:'Matches',route:'admin-matches',icon:ICONS.git},
  ] : isCaregiver ? [
    {label:'Dashboard',route:'cg-dashboard',icon:ICONS.dashboard},
    {label:'My Profile',route:'cg-profile',icon:ICONS.user},
    {label:'Edit Profile',route:'cg-edit',icon:ICONS.file},
    {label:'Video Intro',route:'cg-video',icon:ICONS.video},
  ] : [
    {label:'Dashboard',route:'fam-dashboard',icon:ICONS.dashboard},
    {label:'New Request',route:'fam-new-request',icon:ICONS.file},
    {label:'My Shortlist',route:'fam-shortlist',icon:ICONS.star},
  ];

  const roleLabel = isAdmin ? 'Concierge Suite' : isCaregiver ? 'Caregiver Portal' : 'Family Portal';

  const sidebar = `
  <div class="flex flex-col h-full bg-obsidian-950 overflow-y-auto">
    <div class="px-6 py-8 border-b border-white/10">
      <div class="flex items-center gap-2 mb-1">
        <div class="w-0.5 h-9 bg-champagne rounded-full"></div>
        <div><p class="font-serif text-lg text-ivory-100 leading-tight">La Maison</p><p class="font-serif text-lg text-champagne leading-tight italic">de BéBé</p></div>
      </div>
      <p class="text-xs text-obsidian-500 mt-3 tracking-widest uppercase">${roleLabel}</p>
    </div>
    <nav class="flex-1 px-3 py-6 space-y-1">
      ${navItems.map(item=>{
        const active = STATE.currentRoute===item.route || STATE.currentRoute.startsWith(item.route+'-') ;
        return `<button onclick="navigate('${item.route}')" class="flex items-center gap-3 w-full px-3 py-2.5 rounded-sm text-sm transition-all duration-150 group ${active?'bg-champagne/15 text-champagne border border-champagne/20':'text-obsidian-300 hover:text-ivory-200 hover:bg-white/5'}">
          <span class="${active?'text-champagne':'text-obsidian-500 group-hover:text-obsidian-300'}">${item.icon}</span>
          <span class="flex-1 text-left">${item.label}</span>
          ${active?`<span class="text-champagne/60">${ICONS.chevron_right}</span>`:''}
        </button>`;
      }).join('')}
    </nav>
    <div class="px-3 py-4 border-t border-white/10">
      <div class="px-3 py-2 mb-2">
        <p class="text-xs text-obsidian-300 truncate font-medium">${esc(u.name)}</p>
        <p class="text-xs text-obsidian-500 truncate mt-0.5">${esc(u.email)}</p>
      </div>
      <button onclick="doLogout()" class="flex items-center gap-3 w-full px-3 py-2.5 rounded-sm text-sm text-obsidian-400 hover:text-red-400 hover:bg-red-500/8 transition-all duration-150">
        ${ICONS.logout} Sign Out
      </button>
    </div>
  </div>`;

  return `
  <div class="min-h-screen flex bg-charcoal">
    <!-- Desktop Sidebar -->
    <aside class="hidden lg:flex flex-col w-64 min-h-screen fixed top-0 left-0 z-30">${sidebar}</aside>

    <!-- Mobile Sidebar Overlay -->
    ${STATE.sidebarOpen ? `
    <div class="lg:hidden fixed inset-0 z-50 flex">
      <div class="absolute inset-0 bg-charcoal/70 backdrop-blur-sm" onclick="closeSidebar()"></div>
      <aside class="relative w-72 h-full shadow-luxury" style="animation:slideIn .3s cubic-bezier(.16,1,.3,1)">
        <button onclick="closeSidebar()" class="absolute top-4 right-4 z-10 w-8 h-8 flex items-center justify-center rounded-full text-obsidian-400 hover:text-ivory-200 hover:bg-white/8">${ICONS.x}</button>
        ${sidebar}
      </aside>
    </div>` : ''}

    <!-- Main -->
    <main class="flex-1 lg:ml-64 min-h-screen flex flex-col">
      <header class="sticky top-0 z-20 bg-parchment/90 backdrop-blur-md border-b border-ivory-200 px-4 lg:px-8 h-16 flex items-center justify-between">
        <button onclick="openSidebar()" class="lg:hidden w-10 h-10 flex items-center justify-center rounded-sm text-obsidian-500 hover:bg-ivory-100 transition-colors">${ICONS.menu}</button>
        <p class="hidden lg:block text-xs text-obsidian-400 tracking-widest uppercase">${roleLabel}</p>
        <div class="flex items-center gap-3">
          <p class="text-sm font-medium text-obsidian-800 hidden sm:block">${esc(u.name)}</p>
          <div class="w-9 h-9 rounded-full bg-champagne/20 border border-champagne/30 flex items-center justify-center">

          </div>
        </div>
      </header>
      <div class="flex-1 bg-parchment">${content}</div>
    </main>
  </div>
  ${renderModal()}`;
}

    body=`<div class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-charcoal/80 backdrop-blur-sm" style="animation:fadeIn .25s ease">

            ${goldBtn('Close','closeModal()')}
          </div>`:`<div class="space-y-5">
            <p class="text-sm text-obsidian-500 leading-relaxed">If none of the presented candidates feel quite right, Agripina will return to the search.</p>

            </div>

  }

  if(m==='send-profile'){

    body=`<div class="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style="animation:fadeIn .25s ease">

/* ── FAMILY NEW REQUEST ── */
function renderFamNewRequest(){
  if(STATE.newRequestSubmitted){
    const content = `
    <div class="p-6 lg:p-10 max-w-2xl mx-auto" style="animation:fadeUp .5s cubic-bezier(.16,1,.3,1)">
      <div class="text-center py-20">
        <div class="w-20 h-20 rounded-full bg-champagne/10 flex items-center justify-center mx-auto mb-6 text-champagne">${ICONS.check}</div>
        <h1 class="font-serif text-3xl text-obsidian-900 mb-4">Request Received</h1>
        <p class="text-obsidian-400 text-sm leading-relaxed max-w-sm mx-auto mb-8">Your care request has been submitted. Agripina will review your requirements within 24 hours and begin the discreet matching process.</p>
        ${goldBtn('Return to Dashboard',"navigate('fam-dashboard')")}
      </div>
    </div>`;
    return renderShell(content);
  }

  const step = STATE.newRequestStep||1;
  const f = STATE.newRequestForm;
  const careTypes=['Newborn Care Specialist','Travel Nanny','Rotational Nanny','Household Manager','Night Nurse'];
  const careTypeDescs={
    'Newborn Care Specialist':'Expert care for babies 0–4 months, including feeding, sleep, and settling.',
    'Travel Nanny':'A seasoned nanny comfortable with private aviation, hotels, and multi-country itineraries.',
    'Rotational Nanny':'A two-nanny system providing round-the-clock, consistent care.',
    'Household Manager':'Senior household management with integrated family management responsibilities.',
    'Night Nurse':'Overnight specialist care, typically 10pm–7am, allowing parents to rest.',
  };
  const allLangs=['English','French','Spanish','Italian','German','Arabic','Mandarin','Russian'];
  const steps=[{id:1,l:'Care Type'},{id:2,l:'Children'},{id:3,l:'Schedule'},{id:4,l:'Requirements'},{id:5,l:'Review'}];

  const canProceed = step===1?(!!f.type):step===2?(f.children.every(c=>c.age.trim())):step===3?(!!f.startDate&&!!f.duration):true;

  let stepContent='';
  if(step===1){
    stepContent=`
    <div>
      <h2 class="font-serif text-xl text-obsidian-800 mb-6">What type of care do you require?</h2>
      <div class="space-y-3">
        ${careTypes.map(t=>`
        <label class="flex items-start gap-4 p-4 rounded-sm border cursor-pointer transition-all ${f.type===t?'border-champagne/40 bg-champagne/5':'border-ivory-200 hover:border-champagne/20'}">
          <input type="radio" name="ct" value="${t}" ${f.type===t?'checked':''} onchange="STATE.newRequestForm.type=this.value;render()" class="mt-0.5 accent-champagne"/>
          <div><p class="text-sm font-semibold text-obsidian-800">${t}</p><p class="text-xs text-obsidian-400 mt-0.5 leading-relaxed">${careTypeDescs[t]||''}</p></div>
        </label>`).join('')}
      </div>
    </div>`;
  } else if(step===2){
    stepContent=`
    <div>
      <h2 class="font-serif text-xl text-obsidian-800 mb-6">Tell us about your children</h2>
      <div class="space-y-5">
        ${f.children.map((c,i)=>`
        <div class="p-5 bg-parchment rounded-sm border border-ivory-200 space-y-4">
          <div class="flex items-center justify-between">
            <p class="text-xs font-medium text-obsidian-500 uppercase tracking-wider">Child ${i+1}</p>
            ${f.children.length>1?`<button onclick="removeChild(${i})" class="text-obsidian-300 hover:text-red-500 transition-colors">${ICONS.trash}</button>`:''}
          </div>
          <div><label class="block text-xs text-obsidian-400 mb-1.5">Age / Date of Birth</label><input type="text" value="${esc(c.age)}" oninput="STATE.newRequestForm.children[${i}].age=this.value" class="w-full px-3 py-2.5 bg-white border border-ivory-300 rounded-sm text-sm focus:outline-none focus:ring-2 focus:ring-champagne" placeholder="e.g., Newborn, 3 months, 2 years"/></div>
          <div><label class="block text-xs text-obsidian-400 mb-1.5">Known Allergies</label><input type="text" value="${esc(c.allergies)}" oninput="STATE.newRequestForm.children[${i}].allergies=this.value" class="w-full px-3 py-2.5 bg-white border border-ivory-300 rounded-sm text-sm focus:outline-none focus:ring-2 focus:ring-champagne" placeholder="None, or list specific allergies"/></div>
          <div><label class="block text-xs text-obsidian-400 mb-1.5">Medical Notes (optional)</label><textarea rows="2" oninput="STATE.newRequestForm.children[${i}].medicalNotes=this.value" class="w-full px-3 py-2.5 bg-white border border-ivory-300 rounded-sm text-sm focus:outline-none focus:ring-2 focus:ring-champagne resize-none" placeholder="Any conditions, medications...">${esc(c.medicalNotes)}</textarea></div>
        </div>`).join('')}
        <button type="button" onclick="addChild()" class="flex items-center gap-2 text-sm text-champagne hover:text-gold-600 transition-colors">${ICONS.plus} Add another child</button>
      </div>
    </div>`;
  } else if(step===3){
    stepContent=`
    <div>
      <h2 class="font-serif text-xl text-obsidian-800 mb-6">Schedule & Arrangement</h2>
      <div class="space-y-5">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
          <div><label class="block text-xs font-medium text-obsidian-500 uppercase tracking-wider mb-2">Start Date</label><input type="date" value="${esc(f.startDate)}" onchange="STATE.newRequestForm.startDate=this.value" class="w-full px-4 py-3 bg-parchment border border-ivory-300 rounded-sm text-sm focus:outline-none focus:ring-2 focus:ring-champagne"/></div>
          <div><label class="block text-xs font-medium text-obsidian-500 uppercase tracking-wider mb-2">Duration</label><input type="text" value="${esc(f.duration)}" oninput="STATE.newRequestForm.duration=this.value" class="w-full px-4 py-3 bg-parchment border border-ivory-300 rounded-sm text-sm focus:outline-none focus:ring-2 focus:ring-champagne" placeholder="e.g., 3 months, 1 year, Permanent"/></div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          ${[{l:'Live-in Position',f:'liveIn',d:'The caregiver resides at the property'},{l:'Travel Required',f:'travelRequired',d:'Caregiver will travel with the family'}].map(t=>`
          <label class="flex items-start gap-3 p-4 rounded-sm border cursor-pointer transition-all ${f[t.f]?'border-champagne/40 bg-champagne/5':'border-ivory-200'}">
            <input type="checkbox" ${f[t.f]?'checked':''} onchange="STATE.newRequestForm.${t.f}=this.checked" class="mt-0.5 accent-champagne"/>
            <div><p class="text-sm font-medium text-obsidian-800">${t.l}</p><p class="text-xs text-obsidian-400 mt-0.5">${t.d}</p></div>
          </label>`).join('')}
        </div>
      </div>
    </div>`;
  } else if(step===4){
    stepContent=`
    <div>
      <h2 class="font-serif text-xl text-obsidian-800 mb-6">Specific Requirements</h2>
      <div class="space-y-6">
        <div>
          <label class="block text-xs font-medium text-obsidian-500 uppercase tracking-wider mb-3">Languages Required</label>
          <div class="flex flex-wrap gap-2">
            ${allLangs.map(l=>`<button type="button" onclick="toggleReqLang('${l}')" class="px-3 py-1.5 rounded-sm text-xs font-medium border transition-all ${(f.languages||[]).includes(l)?'bg-champagne/15 border-champagne/40 text-gold-700':'bg-ivory-50 border-ivory-300 text-obsidian-600 hover:border-champagne/30'}">${l}</button>`).join('')}
          </div>
        </div>
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          ${[{l:"Driver's License Required",f:'driverLicense'},{l:'Cooking Skills Required',f:'cooking'}].map(t=>`
          <label class="flex items-center gap-3 p-4 rounded-sm border cursor-pointer transition-all ${f[t.f]?'border-champagne/40 bg-champagne/5':'border-ivory-200'}">
            <input type="checkbox" ${f[t.f]?'checked':''} onchange="STATE.newRequestForm.${t.f}=this.checked" class="accent-champagne"/>
            <p class="text-sm font-medium text-obsidian-800">${t.l}</p>
          </label>`).join('')}
        </div>
        <div><label class="block text-xs font-medium text-obsidian-500 uppercase tracking-wider mb-2">Budget Range <span class="text-obsidian-300 normal-case font-normal">(Optional — discreet)</span></label><input type="text" value="${esc(f.budget||'')}" oninput="STATE.newRequestForm.budget=this.value" class="w-full px-4 py-3 bg-parchment border border-ivory-300 rounded-sm text-sm focus:outline-none focus:ring-2 focus:ring-champagne" placeholder="e.g., Premium, or specific range"/></div>
        <div><label class="block text-xs font-medium text-obsidian-500 uppercase tracking-wider mb-2">Additional Notes</label><textarea rows="5" oninput="STATE.newRequestForm.notes=this.value" class="w-full px-4 py-3 bg-parchment border border-ivory-300 rounded-sm text-sm focus:outline-none focus:ring-2 focus:ring-champagne resize-none leading-relaxed" placeholder="Share any details about your household culture, privacy expectations, or specific needs...">${esc(f.notes||'')}</textarea></div>
      </div>
    </div>`;
  } else if(step===5){
    stepContent=`
    <div>
      <h2 class="font-serif text-xl text-obsidian-800 mb-6">Review Your Request</h2>
      <div class="space-y-4">
        ${[
          ['Care Type',f.type||'—'],
          ['Children',`${f.children.length} child${f.children.length!==1?'ren':''}`],
          ['Start Date',fmt(f.startDate)],
          ['Duration',f.duration||'—'],
          ['Live-in',f.liveIn?'Yes':'No'],
          ['Travel Required',f.travelRequired?'Yes':'No'],
          ['Languages',(f.languages||[]).length>0?f.languages.join(', '):'No preference'],
          ['Budget Range',f.budget||'Not specified'],
        ].map(([l,v])=>`
        <div class="flex items-start justify-between py-3 border-b border-ivory-100">
          <span class="text-xs text-obsidian-400 uppercase tracking-wider">${l}</span>
          <span class="text-sm font-medium text-obsidian-800 text-right max-w-xs">${esc(String(v))}</span>
        </div>`).join('')}
        ${f.notes?`<div class="pt-2"><p class="text-xs text-obsidian-400 uppercase tracking-wider mb-2">Notes</p><p class="text-sm text-obsidian-600 leading-relaxed">${esc(f.notes)}</p></div>`:''}
      </div>
      <div class="mt-6 p-4 bg-parchment rounded-sm border border-ivory-200">
        <p class="text-xs text-obsidian-500 leading-relaxed">By submitting this request, you confirm the information is accurate and authorise La Maison de BéBé to begin the confidential matching process.</p>
      </div>
    </div>`;
  }

  const content = `
  <div class="p-6 lg:p-10 max-w-3xl mx-auto" style="animation:fadeUp .5s cubic-bezier(.16,1,.3,1)">
    <div class="mb-8">
      <p class="text-xs tracking-widest uppercase text-champagne/70 mb-3">New Request</p>
      <h1 class="font-serif text-3xl text-obsidian-900 mb-2">Care Request</h1>
      <p class="text-sm text-obsidian-400">A guided, confidential brief for our concierge matching process.</p>
    </div>

    <!-- Step indicators -->
    <div class="flex items-center gap-0 mb-10 overflow-x-auto pb-2">
      ${steps.map((s,i)=>`
      <div class="flex items-center">
        <div class="flex items-center gap-2 px-2 py-2 rounded-sm text-xs font-medium whitespace-nowrap ${step===s.id?'text-champagne':step>s.id?'text-emerald-600':'text-obsidian-300'}">
          <div class="w-5 h-5 rounded-full flex items-center justify-center text-xs flex-shrink-0 ${step===s.id?'bg-champagne/15 border border-champagne/40 text-champagne':step>s.id?'bg-emerald-100 border border-emerald-300 text-emerald-700':'bg-ivory-100 border border-ivory-300 text-obsidian-400'}">
            ${step>s.id?ICONS.check:s.id}
          </div>
          <span class="hidden sm:block">${s.l}</span>
        </div>
        ${i<steps.length-1?`<div class="w-5 h-px ${step>s.id?'bg-emerald-300':'bg-ivory-300'}"></div>`:''}
      </div>`).join('')}
    </div>

    <div class="bg-white rounded-sm border border-ivory-200 p-6 lg:p-8 mb-6">${stepContent}</div>

    <div class="flex items-center justify-between">
      ${goldBtn(`${ICONS.chevron_left} Back`,'prevStep()','ghost','md',step===1?'opacity-0 pointer-events-none':'')}
      ${step<5?goldBtn(`Continue ${ICONS.chevron_right}`,'nextStep()','primary','md',!canProceed?'opacity-50 pointer-events-none':''):goldBtn('Submit Request','submitNewRequest()')}
    </div>
  </div>`;
  return renderShell(content);
}

/* ── FAMILY SHORTLIST ── */

          <img src="${esc(cg.photo)}" alt="${esc(cg.firstName)}" class="w-full h-full object-cover object-top group-hover:scale-105 transition-transform duration-500" loading="lazy"/>

// ─── RENDER MAIN ─────────────────────────────────────────────
function render(){
  const app = document.getElementById('app');
  const route = STATE.currentRoute;

  if(!STATE.currentUser || route==='login'){
    app.innerHTML = renderLogin();
    return;
  }

  const routeMap = {
    'cg-dashboard': renderCGDashboard,
    'cg-profile': renderCGProfile,
    'cg-edit': renderCGEdit,
    'cg-video': renderCGVideo,
    'fam-dashboard': renderFamDashboard,
    'fam-new-request': renderFamNewRequest,
    'fam-shortlist': renderFamShortlist,
    'fam-schedule': renderFamSchedule,
    'admin-dashboard': renderAdminDashboard,
    'admin-caregivers': renderAdminCaregivers,
    'admin-cg-detail': renderAdminCGDetail,
    'admin-requests': renderAdminRequests,
    'admin-match': renderAdminMatch,
    'admin-matches': renderAdminMatches,
  };

  const renderer = routeMap[route];
  if(renderer){
    app.innerHTML = renderer();
  } else {
    app.innerHTML = renderShell(`<div class="p-10 text-center text-obsidian-400">Page not found.</div>`);
  }
}

// ─── ACTIONS ─────────────────────────────────────────────────
function openSidebar(){ STATE.sidebarOpen=true; render(); }
function closeSidebar(){ STATE.sidebarOpen=false; render(); }
function closeModal(){ STATE.activeModal=null; STATE.modalData={}; render(); }

function openVideoModal(url, name){
  STATE.activeModal='video';
  STATE.modalData={url, name};
  render();
}

function openRequestMoreModal(){
  STATE.activeModal='request-more';
  STATE.modalData={sent:false};
  render();
}

function openSendProfileModal(){
  STATE.sendProfileCaregiverId = STATE.adminCGDetailId||'';
  STATE.activeModal='send-profile';
  STATE.modalData={done:false};
  render();
}

function submitRequestMore(){
  STATE.activeModal='request-more';
  STATE.modalData={sent:true};
  const fp = getFamilyByUserId(STATE.currentUser.id);
  const requests = fp?getRequestsByFamilyId(fp.id):[];
  const req = requests.find(r=>r.status==='shortlisted');
  if(req){ req.status='reviewing'; req.statusLog.push({status:'reviewing',date:new Date().toLocaleDateString()}); }
  render();
}

function doSendProfile(){
  const sel = document.getElementById('send-fam-select');
  if(!sel||!sel.value) return;
  const note = document.getElementById('send-note')?.value||'';
  STATE.actionLogs.unshift({id:uid(),action:`Sent ${getCaregiverById(STATE.sendProfileCaregiverId)?.firstName||''}'s profile to family`,timestamp:new Date().toISOString(),note});
  STATE.activeModal='send-profile';
  STATE.modalData={done:true};
  render();
}

function toggleRoleDropdown(){
  STATE.roleDropdownOpen = !STATE.roleDropdownOpen;
  render();
}

function selectRole(role){
  STATE.loginRole=role;
  STATE.roleDropdownOpen=false;
  render();
}

function toggleSignup(){
  STATE.loginIsSignup=!STATE.loginIsSignup;
  STATE.loginError='';
  render();
}

function fillDemo(){
  const role = STATE.loginRole||'family';
  const demos = {admin:{email:'agripina@lamaisondebebe.com',password:'admin2024'},caregiver:{email:'sophia@example.com',password:'demo'},family:{email:'family@example.com',password:'demo'}};
  const d = demos[role];
  document.getElementById('login-email').value = d.email;
  document.getElementById('login-password').value = d.password;
}

function doLogin(e){
  e.preventDefault();
  const email = document.getElementById('login-email')?.value||'';
  const password = document.getElementById('login-password')?.value||'';
  const role = STATE.loginRole||'family';
  const isSignup = STATE.loginIsSignup||false;

  if(isSignup){
    const name = document.getElementById('login-name')?.value||'';
    if(!name){ STATE.loginError='Please enter your full name.'; render(); return; }
    const exists = STATE.users.find(u=>u.email===email);
    if(exists){ STATE.loginError='An account with this email already exists.'; render(); return; }
    const newUser={id:uid(),email,password,role,name,profileId:'profile-'+uid()};
    STATE.users.push(newUser);
    STATE.currentUser=newUser;
  } else {
    const user = STATE.users.find(u=>u.email===email&&u.password===password&&u.role===role);
    if(!user){ STATE.loginError='Invalid credentials. Please check your email and password.'; render(); return; }
    STATE.currentUser=user;
  }

  STATE.loginError='';
  STATE.roleDropdownOpen=false;
  const redirects={caregiver:'cg-dashboard',family:'fam-dashboard',admin:'admin-dashboard'};
  navigate(redirects[STATE.currentUser.role]);
}

function doLogout(){
  STATE.currentUser=null;
  STATE.profileEditForm=null;
  STATE.videoEditUrl=undefined;
  STATE.videoSaved=false;
  STATE.profileSaved=false;
  STATE.newRequestStep=1;
  STATE.newRequestSubmitted=false;
  STATE.newRequestForm={type:'',children:[{age:'',allergies:'',medicalNotes:''}],startDate:'',duration:'',liveIn:false,travelRequired:false,languages:[],driverLicense:false,cooking:false,budget:'',notes:''};
  STATE.scheduleDate=''; STATE.scheduleTime=''; STATE.scheduleMessage=''; STATE.scheduleSubmitted=false;
  STATE.matchSelectedIds=[]; STATE.matchRequestId=''; STATE.matchPresented=false;
  navigate('login');
}

/* Caregiver edit actions */
function setEditTab(tab){ STATE.caregiverEditTab=tab; render(); }
function updateEditField(field, value){ if(STATE.profileEditForm) STATE.profileEditForm[field]=value; render(); }
function clearEditField(field){ if(STATE.profileEditForm) STATE.profileEditForm[field]=''; render(); }
function toggleEditSkill(skill){
  if(!STATE.profileEditForm) return;
  const skills = STATE.profileEditForm.skills||[];
  STATE.profileEditForm.skills = skills.includes(skill)?skills.filter(s=>s!==skill):[...skills,skill];
  render();
}
function toggleEditLang(lang){
  if(!STATE.profileEditForm) return;
  const langs = STATE.profileEditForm.languages||[];
  STATE.profileEditForm.languages = langs.includes(lang)?langs.filter(l=>l!==lang):[...langs,lang];
  render();
}
function addCert(){
  if(!STATE.profileEditForm) return;
  STATE.profileEditForm.certifications.push({id:uid(),title:'',issuer:'',year:''});
  render();
}
function removeCert(i){
  if(!STATE.profileEditForm) return;
  STATE.profileEditForm.certifications.splice(i,1);
  render();
}
function updateCert(i, field, value){
  if(!STATE.profileEditForm) return;
  STATE.profileEditForm.certifications[i][field]=value;
}
function addMockDoc(){
  if(!STATE.profileEditForm) return;
  const names = ['passport_copy.pdf','background_check.pdf','cpr_cert.pdf','reference_letter.pdf'];
  STATE.profileEditForm.documents.push(names[Math.floor(Math.random()*names.length)]);
  render();
}
function removeDoc(i){
  if(!STATE.profileEditForm) return;
  STATE.profileEditForm.documents.splice(i,1);
  render();
}
function handlePhotoUpload(input){
  const file = input.files[0];
  if(!file||!STATE.profileEditForm) return;
  const reader = new FileReader();
  reader.onload = e => { STATE.profileEditForm.photo=e.target.result; render(); };
  reader.readAsDataURL(file);
}
function saveProfile(){
  if(!STATE.profileEditForm) return;
  const f = STATE.profileEditForm;
  let score = 0;
  if(f.photo) score+=20;
  if(f.bio&&f.bio.length>100) score+=20;
  if((f.skills||[]).length>2) score+=15;
  if((f.certifications||[]).length>0) score+=15;
  if(f.videoUrl) score+=15;
  if((f.documents||[]).length>0) score+=10;
  if((f.languages||[]).length>0) score+=5;
  f.profileCompletion = Math.min(score,100);

  const existing = STATE.caregiverProfiles.findIndex(p=>p.userId===STATE.currentUser.id);
  if(existing>=0){
    STATE.caregiverProfiles[existing]={...STATE.caregiverProfiles[existing],...f};
  } else {
    STATE.caregiverProfiles.push({...f,id:uid(),userId:STATE.currentUser.id});
  }
  STATE.profileSaved=true;
  render();
  setTimeout(()=>{ STATE.profileSaved=false; render(); },3000);
}

/* Video */
function saveVideo(){
  const url = STATE.videoEditUrl||document.getElementById('video-url-inp')?.value||'';
  if(!url) return;
  const p = getProfileByUserId(STATE.currentUser.id);
  if(p){ p.videoUrl=url; p.videoType='youtube'; }
  STATE.videoSaved=true;
  STATE.videoEditUrl=url;
  render();
  setTimeout(()=>{ STATE.videoSaved=false; render(); },3000);
}

/* New Request wizard */
function nextStep(){ if(STATE.newRequestStep<5) STATE.newRequestStep++; render(); }
function prevStep(){ if(STATE.newRequestStep>1) STATE.newRequestStep--; render(); }
function addChild(){ STATE.newRequestForm.children.push({age:'',allergies:'',medicalNotes:''}); render(); }
function removeChild(i){ STATE.newRequestForm.children.splice(i,1); render(); }
function toggleReqLang(lang){
  const langs = STATE.newRequestForm.languages||[];
  STATE.newRequestForm.languages = langs.includes(lang)?langs.filter(l=>l!==lang):[...langs,lang];
  render();
}
function submitNewRequest(){
  const fp = getFamilyByUserId(STATE.currentUser.id);
  if(!fp) return;
  const f = STATE.newRequestForm;
  const newReq={
    id:'req-'+uid(),familyId:fp.id,type:f.type,children:f.children,
    startDate:f.startDate,duration:f.duration,liveIn:f.liveIn,travelRequired:f.travelRequired,
    languages:f.languages,driverLicense:f.driverLicense,cooking:f.cooking,
    budget:f.budget,notes:f.notes,status:'new',
    statusLog:[{status:'new',date:new Date().toLocaleDateString()}],
  };
  STATE.careRequests.push(newReq);
  STATE.newRequestSubmitted=true;
  STATE.newRequestForm={type:'',children:[{age:'',allergies:'',medicalNotes:''}],startDate:'',duration:'',liveIn:false,travelRequired:false,languages:[],driverLicense:false,cooking:false,budget:'',notes:''};
  STATE.newRequestStep=1;
  render();
}

/* Schedule interview */
function resetSchedule(){ STATE.scheduleSubmitted=false; STATE.scheduleDate=''; STATE.scheduleTime=''; STATE.scheduleMessage=''; render(); }
function submitSchedule(){
  const caregiverId = STATE.scheduleTargetCaregiverId;
  const requestId = STATE.scheduleTargetRequestId;
  if(!STATE.scheduleDate||!STATE.scheduleTime||!caregiverId) return;

  const fp = getFamilyByUserId(STATE.currentUser.id);
  const scheduledTime = new Date(`${STATE.scheduleDate}T${STATE.scheduleTime}:00`).toISOString();
  const iv={id:'int-'+uid(),requestId,caregiverId,familyId:fp?.id||'',scheduledTime,displayTime:`${fmt(STATE.scheduleDate)} at ${STATE.scheduleTime}`,message:STATE.scheduleMessage,status:'pending',createdAt:new Date().toISOString()};
  STATE.interviews.push(iv);

  const req = STATE.careRequests.find(r=>r.id===requestId);
  if(req){ req.status='interview_scheduled'; req.statusLog.push({status:'interview_scheduled',date:new Date().toLocaleDateString()}); }

  const sl = STATE.shortlists.find(s=>s.requestId===requestId);
  if(sl){ sl.selectedId=caregiverId; sl.status='selection_made'; }

  STATE.actionLogs.unshift({id:uid(),action:`Interview scheduled with ${getCaregiverById(caregiverId)?.firstName||'caregiver'}`,timestamp:new Date().toISOString()});
  STATE.scheduleSubmitted=true;
  render();
}

/* Admin match */
function toggleMatchSelection(id){
  const sel = STATE.matchSelectedIds||[];
  if(sel.includes(id)){ STATE.matchSelectedIds=sel.filter(s=>s!==id); }
  else if(sel.length<3){ STATE.matchSelectedIds=[...sel,id]; }
  render();
}
function removeMatchSelection(id){
  STATE.matchSelectedIds=(STATE.matchSelectedIds||[]).filter(s=>s!==id);
  render();
}
function presentToFamily(){
  const sel = STATE.matchSelectedIds||[];
  if(sel.length!==3) return;
  const requestId = STATE.matchRequestId;
  const req = STATE.careRequests.find(r=>r.id===requestId);
  if(!req) return;

  const existing = STATE.shortlists.find(s=>s.requestId===requestId);
  if(existing){ existing.caregiverIds=sel; existing.presentedAt=new Date().toLocaleDateString(); existing.status='presented'; }
  else { STATE.shortlists.push({id:'sl-'+uid(),requestId,caregiverIds:sel,presentedAt:new Date().toLocaleDateString(),status:'presented'}); }

  req.status='shortlisted';
  req.statusLog.push({status:'shortlisted',date:new Date().toLocaleDateString(),note:'3 candidates presented to family'});
  STATE.actionLogs.unshift({id:uid(),action:`Presented shortlist of 3 candidates`,timestamp:new Date().toISOString()});
  render();
}
function confirmInterview(id){
  const iv = STATE.interviews.find(i=>i.id===id);
  if(iv){ iv.status='confirmed'; STATE.actionLogs.unshift({id:uid(),action:`Confirmed interview`,timestamp:new Date().toISOString()}); render(); }
}
function toggleAdminSkillFilter(skill){
  const filters = STATE.adminSkillFilter||[];
  STATE.adminSkillFilter = filters.includes(skill)?filters.filter(s=>s!==skill):[...filters,skill];
  render();
}
function clearAdminFilters(){ STATE.adminCGSearch=''; STATE.adminSkillFilter=[]; STATE.adminAvailFilter='all'; render(); }

// Init
render();
</script>
